<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Patches</title>
<style>
  html, body {
    margin: 0; padding: 0; height: 100%; overflow: hidden;
    background: #181a1e; color: #d0d4dc;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    font-size: 12px;
  }
  main {
    display: flex; flex-direction: column;
    height: 100%; min-width: 360px; box-sizing: border-box;
  }
  #halt {
    display: none; background: #5a1f1f; color: #ffd5d5;
    border-bottom: 1px solid #7a2a2a; padding: 6px 10px;
    font-size: 12px; white-space: pre-wrap;
  }
  #halt.visible { display: block; }
  /* Tabs */
  #tabs {
    display: flex; gap: 0; background: #14161a;
    border-bottom: 1px solid #23262c; flex: 0 0 auto;
  }
  #tabs button {
    background: transparent; border: 0; border-right: 1px solid #23262c;
    color: #8a909b; padding: 8px 14px; font-size: 12px; cursor: pointer;
    border-bottom: 2px solid transparent;
  }
  #tabs button.active { color: #d0d4dc; border-bottom-color: #6ad06a; }
  #tabs button:hover { background: #1c1f24; }
  .panel { flex: 1 1 auto; display: none; overflow: auto; min-height: 0; }
  .panel.active { display: flex; flex-direction: column; }

  header {
    padding: 10px 12px 6px; border-bottom: 1px solid #23262c;
    display: flex; flex-direction: column; gap: 6px;
  }
  header h1 { margin: 0; font-size: 14px; font-weight: 500; color: #c8ccd4; }
  #file {
    font-family: ui-monospace, Menlo, monospace; font-size: 11px;
    color: #8a909b; word-break: break-all;
  }
  .row { display: flex; gap: 6px; flex-wrap: wrap; }
  button.btn {
    background: #282c33; color: #d0d4dc; border: 1px solid #3a3f48;
    padding: 4px 10px; font-size: 12px; border-radius: 3px; cursor: pointer;
  }
  button.btn:hover { background: #323742; }
  button.btn.small { padding: 2px 6px; font-size: 11px; }
  section {
    padding: 8px 12px; border-bottom: 1px solid #23262c;
    display: flex; flex-direction: column; gap: 4px;
    flex: 0 0 auto;
  }
  section > h2 {
    margin: 0; font-size: 11px; text-transform: uppercase;
    color: #6a707b; letter-spacing: 0.06em; font-weight: 500;
  }
  #paths { display: flex; flex-direction: column; gap: 2px; max-height: 120px; overflow: auto; }
  .path-row {
    display: flex; gap: 6px; align-items: center;
    font-family: ui-monospace, Menlo, monospace; font-size: 11px;
  }
  .path-row .text { flex: 1; color: #b0b6c0; word-break: break-all; }
  #diagnostics { flex: 0 1 auto; max-height: 40%; overflow: auto; padding: 0; }
  #diagnostics.empty { display: none; }
  #diagnostics .d {
    padding: 6px 12px; border-bottom: 1px solid #1f2228;
    font-family: ui-monospace, Menlo, monospace; font-size: 11px;
  }
  #diagnostics .d.error { border-left: 3px solid #f06060; }
  #diagnostics .d.warning { border-left: 3px solid #d0a040; }
  #diagnostics .d.note { border-left: 3px solid #78a0f0; }
  #diagnostics .d .head { color: #e0e4ec; }
  #diagnostics .d.error .head { color: #ff9090; }
  #diagnostics .d.warning .head { color: #e8c070; }
  #diagnostics .d.note .head { color: #a0c0ff; }
  #diagnostics .d .loc { color: #7a808b; margin-top: 2px; }
  #status-wrap { flex: 1 1 auto; display: flex; flex-direction: column; min-height: 80px; }
  #status {
    flex: 1; overflow: auto;
    font-family: ui-monospace, Menlo, monospace; font-size: 11px;
    background: #14161a; padding: 6px 12px;
    white-space: pre-wrap; color: #a8aeb8;
  }
  /* Source panel */
  #source-host {
    flex: 1; overflow: auto; padding: 8px 12px;
    background: #14161a; font-family: ui-monospace, Menlo, monospace;
    font-size: 11px; line-height: 1.45;
  }
  #source-host pre { margin: 0; padding: 0; background: transparent !important; }
  #source-host code { font-family: inherit; }
  #source-empty { color: #5a606b; padding: 12px; }
  /* Diagram panel */
  #diagram-host {
    flex: 1; overflow: auto; padding: 12px; background: #14161a;
    display: flex; align-items: center; justify-content: center;
  }
  #diagram-host svg { max-width: 100%; height: auto; }
</style>
</head>
<body>
<main>
  <div id="halt"></div>

  <div id="tabs">
    <button data-tab="controls" class="active">Controls</button>
    <button data-tab="source">Source</button>
    <button data-tab="diagram">Diagram</button>
  </div>

  <div id="panel-controls" class="panel active">
    <header>
      <h1>Patches</h1>
      <div id="file">(no file)</div>
      <div class="row">
        <button class="btn" id="btn-browse">Browse</button>
        <button class="btn" id="btn-reload">Reload</button>
        <button class="btn" id="btn-rescan">Rescan</button>
      </div>
    </header>

    <section>
      <h2>Module paths</h2>
      <div id="paths"></div>
      <div class="row">
        <button class="btn small" id="btn-add">Add path</button>
      </div>
    </section>

    <section id="meters-sec">
      <h2>Master</h2>
      <canvas id="meters" width="320" height="40"></canvas>
    </section>

    <section id="diagnostics" class="empty"></section>

    <section id="status-wrap">
      <h2>Status</h2>
      <div id="status"></div>
    </section>
  </div>

  <div id="panel-source" class="panel">
    <div id="source-host"><div id="source-empty">(no source)</div></div>
  </div>

  <div id="panel-diagram" class="panel">
    <div id="diagram-host"></div>
  </div>
</main>

<script type="module">
  // Shiki via ESM CDN. Spike only — vendor for offline use later.
  // MIT licensed.
  import { codeToHtml } from 'https://esm.sh/shiki@1.24.0';

  const sourceHost = document.getElementById('source-host');
  let lastRendered = null;

  window.__shiki = {
    render: async function (text) {
      if (text == null) {
        sourceHost.innerHTML = '<div id="source-empty">(no source)</div>';
        lastRendered = null;
        return;
      }
      if (text === lastRendered) return;
      lastRendered = text;
      try {
        // No `.patches` grammar yet — fall back to a similar lexer.
        const html = await codeToHtml(text, { lang: 'lisp', theme: 'github-dark' });
        sourceHost.innerHTML = html;
      } catch (e) {
        sourceHost.textContent = text;
        console.error('shiki render failed', e);
      }
    },
  };
</script>

<script>
(function () {
  var el = function (id) { return document.getElementById(id); };

  // Tabs
  var tabs = document.querySelectorAll('#tabs button');
  tabs.forEach(function (t) {
    t.addEventListener('click', function () {
      var name = t.getAttribute('data-tab');
      tabs.forEach(function (x) { x.classList.toggle('active', x === t); });
      ['controls','source','diagram'].forEach(function (n) {
        el('panel-' + n).classList.toggle('active', n === name);
      });
    });
  });

  function send(intent) {
    if (window.ipc && window.ipc.postMessage) {
      window.ipc.postMessage(JSON.stringify(intent));
    }
  }

  el('btn-browse').addEventListener('click', function () { send({kind:'browse'}); });
  el('btn-reload').addEventListener('click', function () { send({kind:'reload'}); });
  el('btn-rescan').addEventListener('click', function () { send({kind:'rescan'}); });
  el('btn-add').addEventListener('click', function () { send({kind:'add_path'}); });

  function renderPaths(paths) {
    var root = el('paths');
    root.textContent = '';
    if (!paths || paths.length === 0) {
      var empty = document.createElement('div');
      empty.className = 'path-row';
      empty.innerHTML = '<span class="text" style="color:#5a606b">(no module paths)</span>';
      root.appendChild(empty);
      return;
    }
    paths.forEach(function (p, i) {
      var row = document.createElement('div');
      row.className = 'path-row';
      var text = document.createElement('span');
      text.className = 'text';
      text.textContent = p;
      var btn = document.createElement('button');
      btn.className = 'btn small';
      btn.textContent = 'Remove';
      btn.addEventListener('click', function () {
        send({kind:'remove_path', index: i});
      });
      row.appendChild(text);
      row.appendChild(btn);
      root.appendChild(row);
    });
  }

  function renderDiagnostics(diags) {
    var root = el('diagnostics');
    root.textContent = '';
    if (!diags || diags.length === 0) { root.classList.add('empty'); return; }
    root.classList.remove('empty');
    diags.forEach(function (d) {
      var wrap = document.createElement('div');
      wrap.className = 'd ' + (d.severity || 'error');
      var head = document.createElement('div');
      head.className = 'head';
      var code = d.code ? '[' + d.code + '] ' : '';
      head.textContent = code + (d.message || '');
      wrap.appendChild(head);
      if (d.location || d.label) {
        var loc = document.createElement('div');
        loc.className = 'loc';
        var parts = [];
        if (d.location) parts.push(d.location);
        if (d.label) parts.push(d.label);
        loc.textContent = parts.join(' — ');
        wrap.appendChild(loc);
      }
      root.appendChild(wrap);
    });
  }

  function renderStatus(log) {
    var root = el('status');
    var atBottom = (root.scrollTop + root.clientHeight + 8) >= root.scrollHeight;
    root.textContent = (log || []).join('\n');
    if (atBottom) { root.scrollTop = root.scrollHeight; }
  }

  function renderHalt(msg) {
    var root = el('halt');
    if (msg) { root.textContent = msg; root.classList.add('visible'); }
    else { root.textContent = ''; root.classList.remove('visible'); }
  }

  function renderDiagram(file) {
    // Spike stub: placeholder SVG. Replace once Rust ships diagram_svg.
    var host = el('diagram-host');
    var label = file || '(no file)';
    host.innerHTML =
      '<svg viewBox="0 0 320 180" xmlns="http://www.w3.org/2000/svg">' +
      '<rect x="10" y="10" width="300" height="160" rx="6" ' +
      'fill="#1c1f24" stroke="#3a3f48"/>' +
      '<text x="160" y="80" text-anchor="middle" fill="#8a909b" ' +
      'font-family="ui-monospace,Menlo,monospace" font-size="11">' +
      'patch diagram (spike stub)</text>' +
      '<text x="160" y="100" text-anchor="middle" fill="#6a707b" ' +
      'font-family="ui-monospace,Menlo,monospace" font-size="10">' +
      escapeXml(label) + '</text>' +
      '</svg>';
  }

  function escapeXml(s) {
    return String(s).replace(/[<>&"]/g, function (c) {
      return { '<':'&lt;', '>':'&gt;', '&':'&amp;', '"':'&quot;' }[c];
    });
  }

  // Meters (unchanged from previous spike)
  var meter = {
    tgt: { pl: 0, pr: 0, rl: 0, rr: 0 },
    cur: { pl: 0, pr: 0, rl: 0, rr: 0 },
  };
  function drawMeters() {
    var cv = el('meters'); if (!cv) return;
    var ctx = cv.getContext('2d');
    var w = cv.width, h = cv.height;
    var a = 0.2;
    meter.cur.rl += (meter.tgt.rl - meter.cur.rl) * a;
    meter.cur.rr += (meter.tgt.rr - meter.cur.rr) * a;
    meter.cur.pl = meter.tgt.pl > meter.cur.pl
      ? meter.tgt.pl : meter.cur.pl + (meter.tgt.pl - meter.cur.pl) * a;
    meter.cur.pr = meter.tgt.pr > meter.cur.pr
      ? meter.tgt.pr : meter.cur.pr + (meter.tgt.pr - meter.cur.pr) * a;
    ctx.fillStyle = '#14161a'; ctx.fillRect(0, 0, w, h);
    var barH = (h - 6) / 2;
    function bar(y, peak, rms) {
      var pw = Math.min(1, peak) * w;
      var rw = Math.min(1, rms) * w;
      ctx.fillStyle = '#2a4a2a'; ctx.fillRect(0, y, pw, barH);
      ctx.fillStyle = '#6ad06a'; ctx.fillRect(0, y, rw, barH);
      if (peak >= 0.98) { ctx.fillStyle = '#ff6060'; ctx.fillRect(w - 3, y, 3, barH); }
    }
    bar(2, meter.cur.pl, meter.cur.rl);
    bar(4 + barH, meter.cur.pr, meter.cur.rr);
  }
  function tick() { drawMeters(); requestAnimationFrame(tick); }
  requestAnimationFrame(tick);
  setInterval(function () { send({kind:'poll_meter'}); }, 100);

  window.__patches = {
    applyMeter: function (pl, pr, rl, rr) {
      meter.tgt.pl = pl; meter.tgt.pr = pr;
      meter.tgt.rl = rl; meter.tgt.rr = rr;
    },
    applyState: function (snapshot) {
      try {
        el('file').textContent = snapshot.file_path || '(no file)';
        renderHalt(snapshot.halt_message);
        renderPaths(snapshot.module_paths);
        renderDiagnostics(snapshot.diagnostics);
        renderStatus(snapshot.status_log);
        renderDiagram(snapshot.file_path);
        if (window.__shiki) {
          window.__shiki.render(snapshot.patch_source || null);
        }
      } catch (e) {
        console.error('applyState failed', e);
      }
    },
    send: send,
  };
})();
</script>
</body>
</html>
